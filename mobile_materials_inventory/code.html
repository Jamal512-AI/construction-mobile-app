<script>
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxpUcVcaBnq6aeYexOw8vRVmJV3-F3tUfajMyqvo2Ttp7zgKfX-h9EJKXkdI47jE68s/exec';
    
    async function loadInventory() {
        try {
            document.getElementById('inventory-container').innerHTML = '<div class="text-center p-8 mt-5"><span class="material-symbols-outlined animate-spin text-3xl text-primary">autorenew</span><p>Loading API...</p></div>';
            const res = await fetch(GOOGLE_SCRIPT_URL + '?action=get&sheet=Inventory&t=' + Date.now());
            const data = await res.json();
            
            if(data.status === 'success') {
                const items = data.data;
                const container = document.getElementById('inventory-container');
                container.innerHTML = '';
                if(items.length === 0) container.innerHTML = '<p class="text-center">No materials found</p>';
                
                items.forEach(item => {
                    let stock = parseInt(item.Current_Stock) || 0;
                    let cap = parseInt(item.Total_Capacity) || Math.max(stock, 1);
                    let pct = Math.min(Math.round((stock / cap) * 100), 100);
                    let colorClass = pct < 20 ? 'bg-error text-error' : 'bg-primary text-primary';
                    let barColor = pct < 20 ? 'bg-error' : 'bg-primary';
                    
                    const html = `
                    <div class="bg-surface-container-low p-4 rounded-xl flex items-center gap-4 hover:shadow-md transition-shadow">
                        <div class="w-14 h-14 rounded-lg bg-white overflow-hidden flex-shrink-0 flex items-center justify-center bg-outline-variant/20 text-on-surface">
                            <span class="material-symbols-outlined text-3xl">construction</span>
                        </div>
                        <div class="flex-grow">
                            <h3 class="font-bold text-on-surface">${item.Item_Name}</h3>
                            <div class="flex items-center gap-2 mt-1">
                                <div class="flex-grow bg-outline-variant h-1.5 rounded-full overflow-hidden">
                                    <div class="${barColor} h-full" style="width: ${pct}%"></div>
                                </div>
                                <span class="text-[10px] font-bold ${colorClass.split(' ')[1]}">${stock} ${item.Unit}</span>
                            </div>
                        </div>
                        <div class="text-right">
                            <span class="${colorClass.split(' ')[1]} font-bold text-lg">${pct}%</span>
                            <p class="text-[10px] text-on-surface-variant leading-none uppercase">Stock</p>
                        </div>
                    </div>`;
                    container.insertAdjacentHTML('beforeend', html);
                });
            }
        } catch(e) { console.error(e); }
    }

    async function exportToExcel() {
        const btn = document.getElementById('export-btn');
        const originalText = btn.innerHTML;
        btn.innerHTML = '<span class="material-symbols-outlined animate-spin text-sm align-middle mr-1">autorenew</span> Exporting...';
        btn.disabled = true;

        try {
            const res = await fetch(GOOGLE_SCRIPT_URL + '?action=get&sheet=Inventory&t=' + Date.now());
            const data = await res.json();
            
            if(data.status === 'success' && data.data.length > 0) {
                const items = data.data;
                const headers = Object.keys(items[0]);
                
                // Construct CSV
                const csvRows = [headers.join(',')];
                for(const row of items) {
                    const values = headers.map(header => {
                        const val = (row[header] || '').toString().replace(/"/g, '""');
                        return `"${val}"`;
                    });
                    csvRows.push(values.join(','));
                }
                const csvData = csvRows.join('\n');

                const blob = new Blob([csvData], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                const url = URL.createObjectURL(blob);
                link.setAttribute('href', url);
                link.setAttribute('download', `Inventory_Export_${new Date().toISOString().split('T')[0]}.csv`);
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } else {
                alert("No data available to export.");
            }
        } catch(e) {
            console.error("Export error:", e);
            alert("Failed to export inventory data.");
        } finally {
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        loadInventory();
        
        const modal = document.getElementById('add-modal');
        const fab = document.getElementById('fab-add');
        const cancelBtn = document.getElementById('inv-btn-cancel');
        const saveBtn = document.getElementById('inv-btn-save');

        fab.addEventListener('click', () => modal.classList.remove('hidden'));
        cancelBtn.addEventListener('click', () => {
            modal.classList.add('hidden');
            saveBtn.innerText = 'Save to Inventory';
        });

        saveBtn.addEventListener('click', async () => {
            const name = document.getElementById('inv-name').value;
            const unit = document.getElementById('inv-unit').value;
            const stock = document.getElementById('inv-stock').value;
            const capacity = document.getElementById('inv-capacity').value;
            
            if(!name || !unit) { alert("Please enter material name and unit"); return; }
            saveBtn.innerText = 'Saving...';
            
            const payload = {
                "Item_ID": "INV-" + Date.now().toString().slice(-6),
                "Item_Name": name,
                "Current_Stock": stock || 0,
                "Total_Capacity": capacity || stock || 100,
                "Unit": unit
            };

            try {
                const res = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: "update_inventory", ...payload })
                });
                const out = await res.json();
                if(out.status === 'success') {
                    modal.classList.add('hidden');
                    saveBtn.innerText = 'Save to Inventory';
                    // clear forms
                    document.getElementById('inv-name').value = '';
                    document.getElementById('inv-unit').value = '';
                    document.getElementById('inv-stock').value = '';
                    document.getElementById('inv-capacity').value = '';
                    loadInventory(); // refresh UI
                    alert("Material saved to Google Sheets!");
                } else {
                    alert("Server replied with error: " + (out.message||""));
                    saveBtn.innerText = 'Save to Inventory';
                }
            } catch(e) { 
                console.error("Inventory save error: ", e);
                alert("Error saving material. Please check console."); 
                saveBtn.innerText = 'Save to Inventory'; 
            }
        });
        document.getElementById('export-btn').addEventListener('click', exportToExcel);
    });
</script>
